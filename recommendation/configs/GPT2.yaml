# 文件路径: configs/SIMPLE_GPT.yaml

# SIMPLE_GPT 模型独有的架构参数
model_params:
  # max_len 来自 base.yaml，這里可以覆盖或不写
  # max_len: 20       

  # GPT-2 架构参数
  n_embd: 512       # Embedding 维度
  n_layer: 6        # Transformer 层数
  n_head: 8         # 注意力头的数量
  n_inner: 2048     # FFN 层的中間维度
  
  # Dropout 参数 (可选，若不写则使用 GPT2Config 默认值)
  resid_pdrop: 0.1
  embd_pdrop: 0.1
  attn_pdrop: 0.1
  
  # 其他 GPT-2 参数 (可选)
  layer_norm_epsilon: 1e-5
  initializer_range: 0.02

training_params:
  lr: 0.0001 
  batch_size: 1024