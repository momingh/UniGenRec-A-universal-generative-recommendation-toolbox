# 文件路径: configs/base.yaml

# 训练相关的通用默认值
training_params:
  lr: 0.0001
  batch_size: 128
  steps: null
  num_epochs: 200
  early_stop: 10
  seed: 2023
  device: 'cuda:0'
  num_workers: 4
  eval_interval: 5
  weight_decay: 0.01

model_params:
  max_len: 20

# 评估相关的通用默认值
evaluation_params:
  topk_list: [5, 10, 20]
  beam_size: 20
  batch_size: 512

# 所有模型共享的路径模板
paths:
  dataset_root: "../datasets/{dataset_name}"
  output_root: "../ckpt/recommendation/{dataset_name}/{model_name}_{quant_method}"
  codebook_template: "{dataset_root}/codebooks/{dataset_name}.{quant_method}.codebook.npy"
