# 文件路径: configs/TIGER.yaml

# 用户条件 (对齐 NonameUntitled/tiger): user id 哈希到 user_ids_count 个桶,
# 作为一个 token 追加到 encoder 输入序列末尾。设为 0 或删除则关闭。
user_ids_count: 2000

# TIGER 模型独有的架构参数
model_params:
  max_len: 20
  d_model: 128
  d_ff: 1024
  d_kv: 64
  num_layers: 4
  num_decoder_layers: 4
  num_heads: 6
  dropout_rate: 0.1

training_params:
  lr: 0.0003          # 对齐 NonameUntitled/tiger:固定 3e-4
  eval_interval: 5
  batch_size: 256
  num_epochs: 400
  scheduler: none     # 对齐 repo:不使用 scheduler,全程恒定 lr
  weight_decay: 0     # 对齐 repo:AdamW 不加权重衰减

evaluation_params:
  beam_size: 100       # 从默认 20 降到 10,评估速度翻倍,Recall@10 不受影响
  batch_size: 64      # 从 32 提到 64,提高 GPU 利用率
  use_prefix_trie: false
  use_logits_processor: true
