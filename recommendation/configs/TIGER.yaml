# 文件路径: configs/TIGER.yaml

# TIGER 模型独有的架构参数
model_params:
  max_len: 20
  d_model: 512
  d_ff: 2048
  d_kv: 64
  num_layers: 6
  num_decoder_layers: 6
  num_heads: 8
  dropout_rate: 0.1

# ✨ 范例：覆盖 base.yaml 中的通用参数
# 假设 TIGER 模型使用较小的学习率效果更好
training_params:
  lr: 0.0001 
  batch_size: 128
  # 注意：我们没有写 batch_size，它会自动从 base.yaml 继承

evaluation_params:
  use_prefix_trie: false # <--- 在这里控制！
