model:
  name: han
  hidden_dim: 128
  num_layers: 1
  heads: 2
  negative_slope: 0.2
  dropout: 0.1

loader:
  batch_size: 1024
  num_neighbors: [20]
  negative_samples: 1
  num_workers: 0

metrics:
  top_k: [10]
  full_sort_batch_size: 256

training:
  seed: 42
  device: cuda:0
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  warmup_steps: 0
  scheduler: none
  max_train_batches: null
  early_stop_patience: 20
