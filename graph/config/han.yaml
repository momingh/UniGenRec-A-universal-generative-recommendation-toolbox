model:
  name: han
  hidden_dim: 512
  num_layers: 1
  heads: 2
  negative_slope: 0.2
  dropout: 0.1

graph:
  node_types: [user, item]
  edge_types:
    - [user, interacts, item]
    - [item, rev_interacts, user]

loader:
  batch_size: 1024
  num_neighbors: [20]
  negative_samples: 1
  num_workers: 0

metrics:
  top_k: [10]
  full_sort_batch_size: 1024

training:
  seed: 42
  device: cuda:0
  epochs: 100
  lr: 0.001
  weight_decay: 0.001
  warmup_steps: 0
  scheduler: none
  max_train_batches: null
  eval_interval: 1
  early_stop_patience: 20
