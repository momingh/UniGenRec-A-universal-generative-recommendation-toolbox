model:
  name: lightgcn
  hidden_dim: 512
  num_layers: 1

loader:
  batch_size: 1024
  num_neighbors: [20]
  negative_samples: 1
  num_workers: 0

metrics:
  top_k: [5, 10]
  full_sort_batch_size: 256

output:
  output_root: ../ckpt/graph/{dataset_name}/{model_name}
  item_embeddings: final_item_embeddings.npy
  item_mapping: final_item_embedding_mapping.jsonl

training:
  seed: 42
  device: cuda:0
  epochs: 100
  lr: 0.0001
  weight_decay: 0.001
  warmup_steps: 0
  scheduler: none
  max_train_batches: null
  eval_interval: 1
  early_stop_patience: 20
