dataset: Beauty

paths:
  dataset_root: ../datasets/{dataset_name}
  output_root: ../ckpt/tradition_seq_model/{dataset_name}/SASRec

model_params:
  max_len: 50
  hidden_size: 64
  num_hidden_layers: 2
  num_attention_heads: 2
  intermediate_size: 256
  hidden_dropout_prob: 0.5
  attention_probs_dropout_prob: 0.5
  initializer_range: 0.02

training_params:
  seed: 42
  device: cuda:0
  batch_size: 256
  num_epochs: 200
  lr: 0.001
  weight_decay: 0.0
  num_workers: 4
  early_stop: 20
  eval_interval: 1
  max_grad_norm: null

evaluation_params:
  batch_size: 512
  topk_list: [5, 10, 20]
